<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="cliff-sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2520"/>
      <stop offset="100%" stop-color="#1a1510"/>
    </linearGradient>
    <linearGradient id="cliff-rock" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5a5248"/>
      <stop offset="100%" stop-color="#3a322a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#cliff-sky)"/>
  <!-- Rocky cliff formations -->
  <polygon points="0,240 0,120 40,80 70,100 90,60 130,40 150,70 180,50 200,90 240,60 260,80 290,50 320,70 350,40 380,80 400,60 400,240" fill="url(#cliff-rock)"/>
  <!-- Rock face highlights -->
  <polygon points="40,80 70,100 90,60 80,72 55,88" fill="#6e6456" opacity="0.6"/>
  <polygon points="130,40 150,70 170,55 155,42" fill="#6e6456" opacity="0.5"/>
  <polygon points="240,60 260,80 280,62 262,55" fill="#6e6456" opacity="0.6"/>
  <polygon points="350,40 380,80 395,62 368,44" fill="#6e6456" opacity="0.5"/>
  <!-- Crack lines in rock -->
  <path d="M110 100 L125 140 L120 170" stroke="#221c14" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M230 80 L220 120 L225 160" stroke="#221c14" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M310 90 L305 130 L315 165" stroke="#221c14" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Dark crevice shadows -->
  <path d="M80 100 Q85 130 82 160 L75 160 Q78 130 72 100 Z" fill="#120e08" opacity="0.8"/>
  <path d="M200 90 Q202 120 200 150 L194 150 Q196 120 194 90 Z" fill="#120e08" opacity="0.8"/>
  <!-- Loose rocks on ground -->
  <ellipse cx="60"  cy="230" rx="18" ry="10" fill="#4a4038"/>
  <ellipse cx="160" cy="235" rx="14" ry="8"  fill="#4a4038"/>
  <ellipse cx="280" cy="228" rx="20" ry="11" fill="#4a4038"/>
  <ellipse cx="370" cy="233" rx="16" ry="9"  fill="#4a4038"/>
</svg>
