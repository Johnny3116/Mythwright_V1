<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="canopy-sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c49a3c"/>
      <stop offset="40%" stop-color="#7a5c1e"/>
      <stop offset="100%" stop-color="#1a2a0d"/>
    </linearGradient>
  </defs>
  <!-- Sky with golden sunlight -->
  <rect width="400" height="240" fill="url(#canopy-sky)"/>
  <!-- Sun glow -->
  <ellipse cx="320" cy="30" rx="60" ry="50" fill="#f0c040" opacity="0.25"/>
  <ellipse cx="320" cy="30" rx="30" ry="25" fill="#f5d060" opacity="0.3"/>
  <!-- Golden light shafts -->
  <polygon points="300,0 340,0 280,200 260,200" fill="#d4a843" opacity="0.08"/>
  <polygon points="340,0 370,0 310,200 290,200" fill="#d4a843" opacity="0.06"/>
  <polygon points="260,0 300,0 240,200 220,200" fill="#d4a843" opacity="0.06"/>
  <!-- Tall tree trunks -->
  <rect x="30"  y="50" width="18" height="190" fill="#1a0e06" rx="4"/>
  <rect x="90"  y="30" width="22" height="210" fill="#1c1007" rx="4"/>
  <rect x="180" y="20" width="20" height="220" fill="#1a0e06" rx="4"/>
  <rect x="270" y="40" width="19" height="200" fill="#1c1007" rx="4"/>
  <rect x="350" y="35" width="21" height="205" fill="#1a0e06" rx="4"/>
  <!-- Canopy tops (lit golden-green) -->
  <ellipse cx="39"  cy="50" rx="45" ry="35" fill="#2d5c0e" opacity="0.95"/>
  <ellipse cx="101" cy="30" rx="55" ry="40" fill="#356610" opacity="0.95"/>
  <ellipse cx="190" cy="20" rx="60" ry="42" fill="#2d5c0e" opacity="0.95"/>
  <ellipse cx="280" cy="40" rx="52" ry="38" fill="#2f6010" opacity="0.95"/>
  <ellipse cx="361" cy="35" rx="50" ry="36" fill="#2d5c0e" opacity="0.95"/>
  <!-- Canopy highlight (golden edge) -->
  <ellipse cx="39"  cy="42" rx="42" ry="20" fill="#6a9020" opacity="0.4"/>
  <ellipse cx="101" cy="22" rx="50" ry="22" fill="#6a9020" opacity="0.4"/>
  <ellipse cx="190" cy="12" rx="55" ry="22" fill="#6a9020" opacity="0.4"/>
  <!-- Ground -->
  <path d="M0 210 Q80 195 160 205 Q240 195 320 208 Q360 200 400 210 L400 240 L0 240 Z" fill="#0d1a07"/>
</svg>
