<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="currentColor">
  <!-- D20 outline: icosahedron face approximation — pentagon top, point bottom -->
  <polygon points="24,3 43,15 43,33 24,45 5,33 5,15" fill="currentColor" opacity="0.15" stroke="currentColor" stroke-width="2"/>
  <!-- Inner face lines to suggest 3D -->
  <polygon points="24,3 43,15 24,24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.7"/>
  <polygon points="43,15 43,33 24,24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.7"/>
  <polygon points="43,33 24,45 24,24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.7"/>
  <polygon points="24,45 5,33 24,24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.7"/>
  <polygon points="5,33 5,15 24,24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.7"/>
  <polygon points="5,15 24,3 24,24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.7"/>
  <!-- "20" text at center -->
  <text x="24" y="28" text-anchor="middle" font-size="11" font-weight="bold" font-family="monospace" fill="currentColor">20</text>
</svg>
