<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="currentColor">
  <!-- Clock face -->
  <circle cx="24" cy="24" r="20" fill="currentColor" opacity="0.15"/>
  <circle cx="24" cy="24" r="20" fill="none" stroke="currentColor" stroke-width="2.5"/>
  <!-- Hour markers -->
  <rect x="23" y="7" width="2" height="4" rx="1" fill="currentColor"/>
  <rect x="23" y="37" width="2" height="4" rx="1" fill="currentColor"/>
  <rect x="7" y="23" width="4" height="2" rx="1" fill="currentColor"/>
  <rect x="37" y="23" width="4" height="2" rx="1" fill="currentColor"/>
  <!-- Hour hand -->
  <line x1="24" y1="24" x2="24" y2="14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="24" y1="24" x2="33" y2="24" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="24" cy="24" r="2.5" fill="currentColor"/>
</svg>
